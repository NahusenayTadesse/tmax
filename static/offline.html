<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Offline</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #222;
            text-align: center;
            padding: 3rem 1rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #64748b;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .retry-btn {
            background: #00b4ed;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .retry-btn:hover {
            background: #00b4ed;
        }
    </style>
</head>
<body>
    <div class="icon">🔌</div>
    <h1>You’re Offline</h1>
    <p>It looks like you lost connection.<br>Please check your network and try again.</p>
    <button class="retry-btn" onclick="location.reload()">Retry</button>
</body>
</html>
